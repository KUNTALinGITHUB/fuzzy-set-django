<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fuzzy Set </title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
        }
        .card {
            border-radius: 15px;
        }
        .result-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow-lg p-4">
                <h2 class="text-center mb-4"> Fuzzy Set</h2>

                <form method="POST">
                    {% csrf_token %}

                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Enter Fuzzy Set</label>
                        <input type="text" name="data" class="form-control"
                               placeholder="Example: 1:0.2, 2:0, 3:0.7, 4:1" required>
                        <div class="form-text">
                            Format: element:membership (comma separated)
                        </div>
                    </div>

                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Enter Alpha</label>
                        <input type="number" step="0.01" name="alpha" class="form-control"
                               placeholder="Example: 0.5" required>
                    </div>

                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                             Calculate
                        </button>
                    </div>

                </form>
            </div>

            
            {% if support or alpha_set %}
            <div class="card shadow-lg p-4 mt-4">

                <h4 class="mb-3 text-center"> Results</h4>

                <div class="row">

                    <!-- Support -->
                    <div class="col-md-6">
                        <div class="result-box">
                            <h5>Support Set</h5>
                            <p class="text-success fw-bold">
                                {{ support }}
                            </p>
                            <small class="text-muted">Elements </small>
                        </div>
                    </div>

                    <!-- Alpha Cut -->
                    <div class="col-md-6">
                        <div class="result-box">
                            <h5>Alpha-cut Set</h5>
                            <p class="text-primary fw-bold">
                                {{ alpha_set }}
                            </p>
                            <small class="text-muted">Elements</small>
                        </div>
                    </div>

                </div>

            </div>
            {% endif %}

        </div>
    </div>

</div>

</body>
</html>
